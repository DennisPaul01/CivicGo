<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">CiviTm live civic map preview</title>
  <desc id="desc">A friendly CiviTm social preview showing a live Timisoara map, civic reports, missions, rewards and community impact.</desc>
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fff7"/>
      <stop offset="0.52" stop-color="#e7f9ef"/>
      <stop offset="1" stop-color="#fff4df"/>
    </linearGradient>
    <linearGradient id="seafoam" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#37d2a0"/>
      <stop offset="1" stop-color="#12a87e"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="22" stdDeviation="20" flood-color="#12372c" flood-opacity="0.18"/>
    </filter>
    <pattern id="grid" width="72" height="72" patternUnits="userSpaceOnUse">
      <path d="M72 0H0V72" fill="none" stroke="#124033" stroke-opacity="0.08" stroke-width="2"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#sky)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>

  <g opacity="0.75">
    <path d="M-60 520C112 442 218 560 372 480C531 398 611 285 780 318C927 347 1033 255 1260 306V700H-60Z" fill="#d8f4e8"/>
    <path d="M-70 440C107 344 208 442 350 370C496 296 607 350 762 268C913 189 1025 221 1270 142V700H-70Z" fill="#c6eadf" opacity="0.65"/>
  </g>

  <g transform="translate(72 62)">
    <g filter="url(#shadow)">
      <rect x="0" y="0" width="1056" height="506" rx="36" fill="#fffdf6"/>
    </g>

    <g transform="translate(36 36)">
      <rect x="0" y="0" width="984" height="434" rx="28" fill="#f1fbf5"/>
      <path d="M47 235C154 166 254 178 336 132C454 65 540 78 641 133C736 184 832 173 941 107" fill="none" stroke="#7bd8bd" stroke-width="22" stroke-linecap="round" opacity="0.9"/>
      <path d="M42 311C154 280 240 336 344 290C470 234 574 308 676 248C787 183 858 231 942 197" fill="none" stroke="#ffd36a" stroke-width="18" stroke-linecap="round" opacity="0.85"/>
      <path d="M80 84H933M80 157H933M80 230H933M80 303H933M80 376H933M142 54V404M268 54V404M394 54V404M520 54V404M646 54V404M772 54V404M898 54V404" stroke="#174336" stroke-opacity="0.08" stroke-width="3"/>

      <g transform="translate(42 42)">
        <rect width="372" height="350" rx="26" fill="#fffdf6" opacity="0.96"/>
        <g transform="translate(30 30)">
          <circle cx="34" cy="34" r="34" fill="url(#seafoam)"/>
          <path d="M34 15C25 15 18 22 18 31C18 47 34 56 34 56S50 47 50 31C50 22 43 15 34 15Z" fill="#fffdf6"/>
          <circle cx="34" cy="31" r="6" fill="#12a87e"/>
          <text x="84" y="26" font-family="Poppins, Arial, sans-serif" font-size="27" font-weight="800" fill="#153c34">CiviTm</text>
          <text x="84" y="56" font-family="Poppins, Arial, sans-serif" font-size="16" font-weight="600" fill="#55746b">Live civic map for Timisoara</text>
        </g>
        <text x="30" y="170" font-family="Poppins, Arial, sans-serif" font-size="44" font-weight="800" fill="#12372c">Report.</text>
        <text x="30" y="220" font-family="Poppins, Arial, sans-serif" font-size="44" font-weight="800" fill="#12372c">Earn.</text>
        <text x="30" y="270" font-family="Poppins, Arial, sans-serif" font-size="44" font-weight="800" fill="#12372c">Improve the city.</text>
        <rect x="30" y="304" width="188" height="46" rx="23" fill="#ff6b5f"/>
        <text x="57" y="334" font-family="Poppins, Arial, sans-serif" font-size="17" font-weight="800" fill="#fffdf6">Friday MVP demo</text>
      </g>

      <g transform="translate(556 60)">
        <g filter="url(#shadow)">
          <rect width="344" height="86" rx="24" fill="#fffdf6"/>
        </g>
        <circle cx="48" cy="43" r="19" fill="#ff6b5f"/>
        <text x="82" y="38" font-family="Poppins, Arial, sans-serif" font-size="19" font-weight="800" fill="#12372c">Urgent issue checked</text>
        <text x="82" y="62" font-family="Poppins, Arial, sans-serif" font-size="14" font-weight="600" fill="#55746b">AI triage routed it live</text>
      </g>

      <g transform="translate(650 282)">
        <g filter="url(#shadow)">
          <rect width="270" height="92" rx="24" fill="#12372c"/>
        </g>
        <circle cx="48" cy="46" r="20" fill="#ffd24d"/>
        <text x="84" y="42" font-family="Poppins, Arial, sans-serif" font-size="19" font-weight="800" fill="#fffdf6">Mission unlocked</text>
        <text x="84" y="66" font-family="Poppins, Arial, sans-serif" font-size="14" font-weight="600" fill="#bfe8d9">+120 points and reward</text>
      </g>

      <g transform="translate(502 186)">
        <circle cx="0" cy="0" r="18" fill="#ff6b5f"/>
        <circle cx="0" cy="0" r="32" fill="none" stroke="#ff6b5f" stroke-width="8" opacity="0.22"/>
      </g>
      <g transform="translate(838 246)">
        <circle cx="0" cy="0" r="18" fill="#12a87e"/>
        <circle cx="0" cy="0" r="32" fill="none" stroke="#12a87e" stroke-width="8" opacity="0.22"/>
      </g>
      <g transform="translate(716 120)">
        <circle cx="0" cy="0" r="18" fill="#ffd24d"/>
        <circle cx="0" cy="0" r="32" fill="none" stroke="#ffd24d" stroke-width="8" opacity="0.24"/>
      </g>
    </g>
  </g>
</svg>
